<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitnessOS</title>
    <link rel="stylesheet" href="index.css">
</head>
<body id="app-body">

<div id="app-container">
    
    <main id="view-today" class="app-view">
        <header class="ios-header">
            <span class="date-label" id="current-date">---</span>
            <h1>Today</h1>
        </header>

        <div class="ios-card motivation-banner">
            <img id="motivation-img" src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=800&q=80" alt="Motivation">
        </div>

        <section class="main-card glass">
            <div class="card-content">
                <div class="text-group">
                    <h3>Daily Goal</h3>
                    <p><span id="progress-percent">0</span>% Completed</p>
                    <small id="motivational-quote">Let's get started!</small>
                </div>
                <div class="progress-circle-container">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="progress-circle" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                </div>
            </div>
        </section>

        <section class="ios-card">
            <div class="card-header">
                <span>💧</span><strong> Hydration</strong>
                <span id="water-ml" style="float:right; color:#8E8E93;">0/3600ml</span>
            </div>
            <div class="water-stepper">
                <button class="step-btn" onclick="window.updateWater(-1)">−</button>
                <div class="bottle-display"><span id="water-count">0</span><small> Bottles</small></div>
                <button class="step-btn" onclick="window.updateWater(1)">+</button>
            </div>
        </section>

        <div class="section-title">Daily Checklist</div>
        <section id="habit-list" class="habit-stack"></section>
    </main>

    <main id="view-trends" class="app-view" style="display:none;">
        <header class="ios-header">
            <h1>Trends</h1>
        </header>
        <section class="ios-card">
            <div style="display:flex; justify-content: space-around; text-align:center;">
                <div class="stat-box">
                    <span class="stat-val" id="stat-streak" style="display:block; font-size:28px; font-weight:700; color:var(--ios-blue);">0</span>
                    <span class="stat-label" style="font-size:12px; color:#8E8E93;">Days Logged</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="stat-avg" style="display:block; font-size:28px; font-weight:700; color:var(--ios-green);">0%</span>
                    <span class="stat-label" style="font-size:12px; color:#8E8E93;">Avg Score</span>
                </div>
            </div>
        </section>
    </main>

    <main id="view-settings" class="app-view" style="display:none;">
        <header class="ios-header">
            <h1>Settings</h1>
        </header>
        <div class="ios-card">
            <div class="settings-item" onclick="window.resetDay()" style="padding: 15px 0; border-bottom: 0.5px solid #eee; cursor:pointer;">
                <span style="color:var(--ios-blue); font-weight:600;">Clear Today's Progress</span>
            </div>
            <div class="settings-item" onclick="window.clearHistory()" style="padding: 15px 0; cursor:pointer;">
                <span style="color:#FF3B30; font-weight:600;">Reset All Trend History</span>
            </div>
        </div>
        <p style="text-align:center; color:#8E8E93; font-size:12px; margin-top:20px;">FitnessOS v1.0</p>
    </main>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="window.switchTab('today', event)">
            <span class="tab-icon">◎</span><small>Today</small>
        </div>
        <div class="tab-item" onclick="window.switchTab('trends', event)">
            <span class="tab-icon">📊</span><small>Trends</small>
        </div>
        <div class="tab-item" onclick="window.switchTab('settings', event)">
            <span class="tab-icon">⚙️</span><small>Settings</small>
        </div>
    </nav>
</div>

<script src="index.js" defer></script>
</body>
</html>
